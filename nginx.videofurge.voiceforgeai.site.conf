# nginx config for videofurge.voiceforgeai.site
#
# Install:
#   sudo cp nginx.videofurge.voiceforgeai.site.conf /etc/nginx/sites-available/videofurge
#   sudo ln -sf /etc/nginx/sites-available/videofurge /etc/nginx/sites-enabled/videofurge
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Get a certificate (recommended):
#   sudo certbot --nginx -d videofurge.voiceforgeai.site
#   (then re-copy or edit the ssl_ lines if certbot rewrote the file)
#
# Your current host setup proxies main domain on 8088/8443 because Docker owns 80/443.
# Keep the same pattern for the subdomain.

# HTTP redirect
server {
    listen 8088;
    server_name videofurge.voiceforgeai.site;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 8443 ssl http2;
    server_name videofurge.voiceforgeai.site;

    # These paths will exist after you run certbot for this exact domain
    ssl_certificate /etc/letsencrypt/live/videofurge.voiceforgeai.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/videofurge.voiceforgeai.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
    }

    client_max_body_size 3G;
}
